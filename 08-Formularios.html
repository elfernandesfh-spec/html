<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario em html 5</title>
</head>
<body>
    <h1>Formulario em html 5</h1>
    <h2>Cadastro de novo usuario</h2>
    <form action="">
        <label for="nome">Nome Completo:</label><br>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome aqui"><br><br>
        <label for="email">Email</label><br>
        <input type="email" name="email" id="email" placeholder="digite seu email aqui"><br><br>
        <label for="senha">Senha</label><br>
        <input type="password" name="senha" id="senha" placeholder="digite sua senha aqui"><br><br>
        <label for="data-nascimento">Data de Nascimento</label><br>
        <input type="date" name="data-nascimento" id="data-nascimento"><br><br>
        <label for="genero">Selecione seu genêro</label><br>
        <input type="radio" name="genero" id="masculino" value="masculino">
        <label for="masculino">Masculino</label>
        <input type="radio" name="genero" id="feminino" value="feminino">
        <label for="feminino">Feminino</label><br><br>
        <select name="setor" id="setor">
            <option value="vendas">Vendas</option>
            <option value="marketing">Marketing</option>
            <option value="ti">TI</option>
            <option value="adm">ADM</option>
        </select><br><br>
        <label for="hobby">Hobby(escolha uma ou mais opções)</label>
        <input type="checkbox" name="hobby" id="leitura" value="leitura">
        <label for="leitura">Leitura</label>
        <input type="checkbox" name="hobby" id="musica" value="musica">
        <label for="musica">Musica</label>
        <input type="checkbox" name="hobby" id="esportes" value="esportes">
        <label for="esportes">Esportes</label><br><br>
        <button type="submit">Cadastrar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
